<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#fdfcfa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#131417" media="(prefers-color-scheme: dark)">
  {% seo %}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='25' x='4' font-size='26' font-family='Georgia,serif'>Z</text></svg>">
</head>
<body>
  <a class="skip" href="#main">Skip to content</a>
  <div class="shell">
    {% include sidebar.html %}
    <main id="main" class="main">
      {{ content }}
      <footer class="foot">
        <p>&copy; {{ 'now' | date: "%Y" }} {{ site.data.profile.name }}. Built with Jekyll, hosted on GitHub Pages.</p>
      </footer>
    </main>
  </div>
</body>
</html>
