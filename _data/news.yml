# ---------------------------------------------------------------
# News. Newest first — rendered in the order written. The page shows the
# first 5; anything beyond that folds into an "Earlier news" toggle.
# Empty the list and the whole section hides itself.
#
# `date` is free text, so you can tighten the granularity whenever you
# like — "2026" and "2026-05" both render fine, and mixing them is fine
# too. The years below are the years the work appeared; if a paper was
# accepted in a different year, adjust.
#
#   - date: 2026-05
#     text: Free HTML allowed, e.g. <a href="...">a link</a>.
# ---------------------------------------------------------------

